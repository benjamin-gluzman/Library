<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Onest:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="heading">
        <h1>Library</h1>
        <button class="showForm">Add book</button>
    </div>

    <dialog>
        <form novalidate>
            <label for="title">Title</label>
            <input type="text" id="title" required>

            <label for="author">Author</label>
            <input type="text" id="author" required>
                
            <label for="pages">Pages</label>
            <input type="number" id="pages" min="1" required>

            <label for="isRead">Finished Reading?</label>
            <input type="checkbox" id="isRead">

            <button type="submit" class="addBook">Add</button>
        </form>
    </dialog>

    

    <div class="container">
        
    </div>
</body>
</html>
